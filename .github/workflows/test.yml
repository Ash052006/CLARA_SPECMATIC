name: Clara CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Specmatic
        run: npm install

      - name: Run Unit Tests
        env:
          CLARA_CONTRACT_TEST_MODE: "1"
        run: pytest

      - name: Backward Compatibility Check
        run: |
          npx specmatic backward-compatibility-check \
            --repo-dir=. \
            --base-branch=origin/${{ github.base_ref || 'main' }} \
            --target-path=contracts/clara_api.yaml

      - name: Start Clara
        env:
          CLARA_CONTRACT_TEST_MODE: "1"
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 > clara.log 2>&1 &
          echo $! > clara.pid

          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8000/health && break
            sleep 1
          done

      - name: Run Contract + Schema Resiliency Tests
        run: |
          mkdir -p reports

          npx specmatic test \
            contracts/clara_api.yaml \
            --testBaseURL=http://127.0.0.1:8000 \
            --junitReportDir=reports

      - name: Start Specmatic Stub
        run: |
          npx specmatic stub contracts/clara_api.yaml \
            --host=127.0.0.1 \
            --port=9000 \
            > specmatic-stub.log 2>&1 &

          echo $! > specmatic.pid

          for i in {1..30}; do
            curl -fsS http://127.0.0.1:9000/ && break
            sleep 1
          done

      - name: Upload Specmatic Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-reports
          path: reports/

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs
          path: |
            clara.log
            specmatic-stub.log

      - name: Stop Services
        if: always()
        run: |
          if [ -f clara.pid ]; then kill $(cat clara.pid) || true; fi
          if [ -f specmatic.pid ]; then kill $(cat specmatic.pid) || true; fi