openapi: 3.0.3
info:
  title: Clara API
  version: 1.0.0
  description: Contract for Clara's conversational AI API, executable by Specmatic.
servers:
  - url: http://127.0.0.1:8000
paths:
  /:
    get:
      summary: Health check
      operationId: getHome
      responses:
        '200':
          description: Clara is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                HOME_200_OK:
                  value:
                    message: CLARA is alive
  /health:
    get:
      summary: Detailed system health
      operationId: getHealth
      responses:
        '200':
          description: Current system health.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemHealthResponse'
              examples:
                HEALTH_200_OK:
                  value:
                    status: ok
                    version: 1.0.0
                    conversation_manager: available
                    timestamp: '2026-06-29T12:00:00+00:00'
  /api/status:
    get:
      summary: API status
      operationId: getApiStatus
      responses:
        '200':
          description: Current API version and status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusResponse'
              examples:
                STATUS_200_OK:
                  value:
                    api: Clara
                    version: 1.0.0
                    status: ok
                    timestamp: '2026-06-29T12:00:00+00:00'
  /chat/{message}:
    get:
      summary: Process a conversational message
      operationId: chat
      parameters:
        - name: message
          in: path
          required: true
          description: User message to process. Whitespace-only values are rejected.
          schema:
            type: string
            minLength: 1
            maxLength: 2000
          examples:
            CHAT_200_OK:
              value: What time is my next meeting
            CHAT_400_EMPTY_MESSAGE:
              value: __blank__
            CHAT_500_INTERNAL_ERROR:
              value: raise error
      responses:
        '200':
          description: Clara processed the message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
              examples:
                CHAT_200_OK:
                  summary: Inline success example
                  value:
                    response: 'Contract test response for: What time is my next meeting'
                    timestamp: '2026-06-29T12:00:00+00:00'
                    conversation_id: 123e4567-e89b-12d3-a456-426614174000
                    plan:
                      - job: general
                        steps:
                          - answer the user's request
                    tools:
                      - chat.response
                    execution:
                      - tool: chat.response
                        status: success
                    memory: {}
                    preferences: {}
                    long_term: {}
        '400':
          description: The message is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                CHAT_400_EMPTY_MESSAGE:
                  value:
                    error_code: EMPTY_MESSAGE
                    message: Message must contain at least one non-space character.
                    details:
                      parameter: message
        '500':
          description: Clara failed while processing the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                CHAT_500_INTERNAL_ERROR:
                  value:
                    error_code: INTERNAL_SERVER_ERROR
                    message: Clara could not process the request.
                    details:
                      type: RuntimeError

components:
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string
          minLength: 1
    SystemHealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - version
        - conversation_manager
        - timestamp
      properties:
        status:
          type: string
          enum:
            - ok
        version:
          type: string
          minLength: 1
        conversation_manager:
          type: string
          enum:
            - available
            - disabled
        timestamp:
          type: string
          format: date-time
    ApiStatusResponse:
      type: object
      additionalProperties: false
      required:
        - api
        - version
        - status
        - timestamp
      properties:
        api:
          type: string
          enum:
            - Clara
        version:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - ok
        timestamp:
          type: string
          format: date-time
    ChatResponse:
      type: object
      additionalProperties: true
      required:
        - response
        - timestamp
        - conversation_id
      properties:
        response:
          type: string
        timestamp:
          type: string
          format: date-time
        conversation_id:
          type: string
          minLength: 1
        plan:
          type: array
          items:
            type: object
        tools:
          type: array
          items:
            type: string
        execution:
          type: array
          items: {}
        memory:
          type: object
        preferences:
          type: object
        long_term:
          type: object
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error_code
        - message
        - details
      properties:
        error_code:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
        details:
          type: object
